<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#0d2438"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Glow blob behind N -->
  <ellipse cx="64" cy="64" rx="38" ry="36" fill="url(#glow)" opacity="0.18" filter="url(#blur1)"/>

  <!-- Connection lines (network/nexus motif) -->
  <!-- Top-left node to top-right node -->
  <line x1="28" y1="28" x2="100" y2="28" stroke="url(#glow)" stroke-width="1" opacity="0.35"/>
  <!-- Top-left to bottom-left -->
  <line x1="28" y1="28" x2="28" y2="100" stroke="url(#glow)" stroke-width="1" opacity="0.35"/>
  <!-- Top-right to bottom-right -->
  <line x1="100" y1="28" x2="100" y2="100" stroke="url(#glow)" stroke-width="1" opacity="0.35"/>
  <!-- Bottom-left to bottom-right -->
  <line x1="28" y1="100" x2="100" y2="100" stroke="url(#glow)" stroke-width="1" opacity="0.35"/>
  <!-- Diagonals -->
  <line x1="28" y1="28" x2="100" y2="100" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="28" x2="28" y2="100" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>

  <!-- Corner nodes -->
  <circle cx="28" cy="28" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="100" cy="28" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="28" cy="100" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="100" cy="100" r="4" fill="#7c3aed" opacity="0.7"/>

  <!-- Bold N letterform (custom paths for thick strokes) -->
  <!-- Left vertical bar -->
  <rect x="28" y="30" width="14" height="68" rx="4" fill="url(#glow)"/>
  <!-- Right vertical bar -->
  <rect x="86" y="30" width="14" height="68" rx="4" fill="url(#glow)"/>
  <!-- Diagonal stroke (top-left to bottom-right) -->
  <polygon points="42,30 56,30 86,98 72,98" fill="url(#glow)"/>

  <!-- Center pulse dot -->
  <circle cx="64" cy="64" r="5" fill="#e0f2fe" opacity="0.9" filter="url(#blur2)"/>
  <circle cx="64" cy="64" r="3" fill="#ffffff"/>
</svg>
