<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#0d2438"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="16" height="16" rx="3.5" fill="url(#bg)"/>
  <!-- N letterform, simplified for 16px -->
  <rect x="3" y="3" width="2.5" height="10" rx="1" fill="url(#glow)"/>
  <rect x="10.5" y="3" width="2.5" height="10" rx="1" fill="url(#glow)"/>
  <polygon points="5.5,3 7,3 10.5,13 9,13" fill="url(#glow)"/>
</svg>
