<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#0d2438"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- Corner nodes + lines -->
  <line x1="10" y1="10" x2="38" y2="10" stroke="url(#glow)" stroke-width="0.8" opacity="0.35"/>
  <line x1="10" y1="10" x2="38" y2="38" stroke="url(#glow)" stroke-width="0.8" opacity="0.2"/>
  <line x1="38" y1="10" x2="10" y2="38" stroke="url(#glow)" stroke-width="0.8" opacity="0.2"/>
  <circle cx="10" cy="10" r="2" fill="#7c3aed" opacity="0.8"/>
  <circle cx="38" cy="10" r="2" fill="#06b6d4" opacity="0.8"/>
  <circle cx="10" cy="38" r="2" fill="#06b6d4" opacity="0.8"/>
  <circle cx="38" cy="38" r="2" fill="#7c3aed" opacity="0.8"/>

  <!-- N letterform -->
  <rect x="10" y="11" width="6" height="26" rx="2" fill="url(#glow)"/>
  <rect x="32" y="11" width="6" height="26" rx="2" fill="url(#glow)"/>
  <polygon points="16,11 21,11 32,37 27,37" fill="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="#ffffff" opacity="0.9"/>
</svg>
